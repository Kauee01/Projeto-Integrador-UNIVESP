<!--
    cadastrar_produto.html — Página de cadastro de novo produto.

    Formulário com campos: nome, descrição (opcional), preço, categoria
    e quantidade inicial em estoque. Envia via POST para /cadastrar-produto.

    Variáveis recebidas do backend (routes.py → cadastrar_produto):
      - categorias: lista de objetos Categoria (id, nome) para o <select>
      - erro: mensagem de erro (string ou None)
-->
{% extends 'base.html' %}

{% block title %}Cadastrar Produto{% endblock %}

{% block styles %}
<!-- CSS específico da página de cadastro de produto -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/cadastrar_produto.css') }}">
{% endblock %}

{% block content %}
<!-- Container centralizado: col-md-7 em tablets, col-lg-6 em desktop -->
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <!-- Título da página -->
                <h2 class="text-center mb-4">Novo Produto</h2>

                <!-- Mensagem de erro (ex: produto já existe, campos inválidos) -->
                {% if erro %}
                <div class="alert alert-danger text-center" role="alert">{{ erro }}</div>
                {% endif %}

                <!-- Formulário de cadastro — envia para a mesma rota via POST -->
                <form method="POST">
                    <!-- Campo: Nome do Produto (obrigatório) -->
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome do Produto</label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="Ex: Camiseta Básica" required>
                    </div>
                    <!-- Campo: Descrição (opcional) -->
                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição <small class="text-muted">(opcional)</small></label>
                        <textarea class="form-control" id="descricao" name="descricao" rows="3" placeholder="Descrição do produto"></textarea>
                    </div>
                    <!-- Campo: Preço em reais (step=0.01 para centavos) -->
                    <div class="mb-3">
                        <label for="preco" class="form-label">Preço (R$)</label>
                        <input type="number" class="form-control" id="preco" name="preco" step="0.01" placeholder="0.00" required>
                    </div>
                    <!-- Campo: Categoria — <select> populado com dados do banco -->
                    <div class="mb-3">
                        <label for="categoria_id" class="form-label">Categoria</label>
                        <select class="form-select" id="categoria_id" name="categoria_id" required>
                            <option value="">Selecione uma Categoria</option>
                            {% for categoria in categorias %}
                            <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <!-- Campo: Quantidade inicial de estoque (mínimo 1) -->
                    <div class="mb-3">
                        <label for="quantidade" class="form-label">Quantidade em Estoque</label>
                        <input type="number" class="form-control" id="quantidade" name="quantidade" min="1" placeholder="1" required>
                    </div>
                    <!-- Botão de submissão — cor amarela (btn-warning) -->
                    <button type="submit" class="btn btn-warning w-100 fw-bold">Cadastrar Produto</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
