<!DOCTYPE html>
<html lang="pt-br">
    {% extends 'base.html' %}

    {% block title %}Cadastrar Produto{% endblock %}

    {% block content %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastrar_produto.css') }}">

<form method="POST">
    <h2>Novo Produto</h2>
    {% if erro %}
    <p class="erro">{{ erro }}</p>
    {% endif %}
    
    <!-- Nome do Produto -->
    <input type="text" name="nome" placeholder="Nome do Produto" required>

    <!-- Descrição do Produto (opcional) -->
    <textarea name="descricao" placeholder="Descrição (opcional)"></textarea>

    <!-- Preço do Produto -->
    <input type="number" step="0.01" name="preco" placeholder="Preço" required>

    <!-- Categoria do Produto -->
    <select name="categoria_id" required>
        <option value="">Selecione uma Categoria</option>
        {% for categoria in categorias %}
        <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
        {% endfor %}
    </select>

    <!-- Quantidade de Produtos a Adicionar -->
    <input type="number" name="quantidade" placeholder="Quantidade em Estoque" required min="1">

    <!-- Botão de Envio -->
    <button type="submit">Cadastrar Produto</button>
</form>
    {% endblock %}
</html>
